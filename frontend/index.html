<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website RAG Chatbot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="panel setup-panel" aria-labelledby="setup-title">
      <div class="brand-row">
        <div>
          <p class="eyebrow">Website RAG Chatbot</p>
          <h1 id="setup-title">Ask questions from any website</h1>
        </div>
        <span class="status-pill" id="status-pill">Idle</span>
      </div>

      <form id="crawl-form" class="crawl-form">
        <label for="website-url">Website URL</label>
        <div class="input-row">
          <input id="website-url" name="website-url" type="url" placeholder="https://example.com" autocomplete="url" required>
          <button type="submit" id="crawl-button">Crawl</button>
        </div>
      </form>
    </section>

    <section class="chat-layout">
      <section class="panel chat-panel" aria-labelledby="chat-title">
        <div class="chat-header">
          <div>
            <p class="eyebrow">Chat</p>
            <h2 id="chat-title">Question answering</h2>
          </div>
          <div class="spinner" id="loading-spinner" aria-hidden="true"></div>
        </div>

        <div class="answer-window" id="answer-window" aria-live="polite">
          <p class="placeholder">Crawl a website, then ask a question. Answers will appear here with retrieved sources.</p>
        </div>

        <form id="chat-form" class="chat-form">
          <label for="question-input">Ask a question</label>
          <div class="input-row question-row">
            <input id="question-input" name="question-input" type="text" placeholder="What is this website about?" autocomplete="off" required>
            <button type="submit" id="ask-button">Ask</button>
          </div>
        </form>
      </section>

      <aside class="panel source-panel" aria-labelledby="source-title">
        <p class="eyebrow">Retrieved context</p>
        <h2 id="source-title">Sources</h2>
        <div id="sources-list" class="sources-list">
          <p class="placeholder">No sources yet.</p>
        </div>
      </aside>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
