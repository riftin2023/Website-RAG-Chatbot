<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website RAG Chatbot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="workspace">
    <aside class="setup-card" aria-labelledby="setup-title">
      <div class="card-title">
        <h1 id="setup-title">RAG Setup</h1>
        <p>Configure the chatbot</p>
      </div>

      <form id="crawl-form" class="setup-form">
        <div class="field-group">
          <label for="api-key">Groq API Key</label>
          <input id="api-key" name="api-key" type="password" placeholder="gsk_..." autocomplete="off">
          <p class="field-note">Required to generate answers</p>
        </div>

        <div class="field-group">
          <label for="website-url">Website URL</label>
          <input id="website-url" name="website-url" type="url" placeholder="https://example.com" required>
        </div>

        <button class="primary-button" id="crawl-button" type="submit">Ingest Website</button>
      </form>

      <div class="ingest-status" id="ingest-status">
        Waiting for website ingestion
      </div>
    </aside>

    <section class="chat-card" aria-labelledby="chat-title">
      <header class="chat-header">
        <div>
          <h2 id="chat-title">Website Chatbot</h2>
          <p id="chat-subtitle">Ask questions from the currently ingested website.</p>
        </div>
        <span class="active-pill" id="active-pill">Inactive</span>
      </header>

      <div class="messages" id="messages" aria-live="polite">
        <article class="message assistant-message">
          <p>Enter your Groq API key, ingest a website, then ask a question about its content.</p>
        </article>
      </div>

      <form id="chat-form" class="chat-input-row">
        <input id="question-input" name="question-input" type="text" placeholder="Ask a question about the website..." autocomplete="off" required>
        <button id="ask-button" class="send-button" type="submit" aria-label="Send question">Send</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
