<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website RAG Chatbot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-container">
    <aside class="sidebar glass-panel">
      <div class="sidebar-header">
        <h2>RAG Setup</h2>
        <p>Configure the chatbot</p>
      </div>

      <div class="form-group">
        <label for="groq-api-key">Groq API Key</label>
        <input id="groq-api-key" type="password" placeholder="gsk_..." autocomplete="off">
        <small>Required to generate answers</small>
      </div>

      <div class="form-group">
        <label for="website-url">Website URL</label>
        <input id="website-url" type="url" placeholder="https://example.com" autocomplete="url">
      </div>

      <button id="btn-ingest" class="primary-btn" type="button">
        <span class="btn-text">Ingest Website</span>
        <span class="loader hidden" aria-hidden="true"></span>
      </button>

      <div id="ingest-status" class="status-message hidden"></div>
    </aside>

    <section class="chat-area glass-panel">
      <header class="chat-header">
        <h1>Website Chatbot</h1>
        <span id="active-url-badge" class="badge hidden">Inactive</span>
      </header>

      <div id="chat-messages" class="chat-messages" aria-live="polite">
        <div class="message ai-message">
          <div class="message-content">
            Enter your Groq API key, ingest a website, then ask questions about its content.
          </div>
        </div>
      </div>

      <div class="chat-input-container">
        <input id="chat-input" type="text" placeholder="Ask a question about the website..." autocomplete="off" disabled>
        <button id="btn-send" class="icon-btn" type="button" disabled aria-label="Send question">Send</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
